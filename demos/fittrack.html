<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack App - Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f0f23;color:#e0e0ff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone{width:375px;max-width:100%;background:#0a0a1e;border-radius:40px;border:3px solid rgba(108,99,255,.3);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.status-bar{display:flex;justify-content:space-between;padding:12px 24px;font-size:12px;color:#a0a0c0}
.app-header{padding:0 24px 20px;display:flex;justify-content:space-between;align-items:center}
.app-header h1{font-size:22px}
.app-header .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#00d4ff);display:flex;align-items:center;justify-content:center;font-size:18px}
.greeting{padding:0 24px 24px;font-size:14px;color:#a0a0c0}
.greeting span{color:#00d4ff}
.progress-ring{display:flex;justify-content:center;padding:0 24px 24px}
.ring-container{position:relative;width:180px;height:180px}
.ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(108,99,255,.15);stroke-width:12}
.ring-fill{fill:none;stroke:url(#gradient);stroke-width:12;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:110;transition:1s}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-percent{font-size:42px;font-weight:800;background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ring-label{font-size:12px;color:#a0a0c0}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 24px 24px}
.stat{background:rgba(20,20,55,.7);border-radius:16px;padding:16px;text-align:center;border:1px solid rgba(108,99,255,.1)}
.stat .icon{font-size:24px;margin-bottom:8px}
.stat .val{font-size:20px;font-weight:700}
.stat .lbl{font-size:11px;color:#a0a0c0;margin-top:4px}
.workouts{padding:0 24px 24px}
.workouts h3{font-size:16px;margin-bottom:12px}
.workout-item{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(20,20,55,.5);border-radius:12px;margin-bottom:8px;border:1px solid rgba(108,99,255,.08)}
.workout-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.workout-info{flex:1}
.workout-info h4{font-size:14px;margin-bottom:2px}
.workout-info span{font-size:12px;color:#a0a0c0}
.workout-cal{font-size:14px;font-weight:700;color:#ff6b9d}
.bottom-nav{display:flex;justify-content:space-around;padding:16px 0;border-top:1px solid rgba(108,99,255,.1);background:rgba(10,10,30,.9)}
.bottom-nav a{font-size:22px;color:#a0a0c0;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:20px}
.bottom-nav a span{font-size:10px}
.bottom-nav a.active{color:#6c63ff}
</style>
</head>
<body>
<div class="phone">
    <div class="status-bar"><span>9:41</span><span>📶 🔋 92%</span></div>
    <div class="app-header"><h1>FitTrack</h1><div class="avatar">👤</div></div>
    <div class="greeting">¡Buenos días, <span>Arturo</span>! 💪</div>
    <div class="progress-ring">
        <div class="ring-container">
            <svg class="ring-svg" viewBox="0 0 160 160">
                <defs><linearGradient id="gradient"><stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#00d4ff"/></linearGradient></defs>
                <circle class="ring-bg" cx="80" cy="80" r="70"/>
                <circle class="ring-fill" cx="80" cy="80" r="70"/>
            </svg>
            <div class="ring-text">
                <span class="ring-percent">75%</span>
                <span class="ring-label">Meta diaria</span>
            </div>
        </div>
    </div>
    <div class="stats-row">
        <div class="stat"><div class="icon">🔥</div><div class="val" style="color:#ff6b9d">486</div><div class="lbl">Calorías</div></div>
        <div class="stat"><div class="icon">👣</div><div class="val" style="color:#00d4ff">8,240</div><div class="lbl">Pasos</div></div>
        <div class="stat"><div class="icon">⏱️</div><div class="val" style="color:#00e676">47m</div><div class="lbl">Activo</div></div>
    </div>
    <div class="workouts">
        <h3>Entrenamientos de Hoy</h3>
        <div class="workout-item">
            <div class="workout-icon" style="background:rgba(108,99,255,.2)">🏃</div>
            <div class="workout-info"><h4>Running</h4><span>30 min · 5.2 km</span></div>
            <div class="workout-cal">-320 kcal</div>
        </div>
        <div class="workout-item">
            <div class="workout-icon" style="background:rgba(0,212,255,.2)">💪</div>
            <div class="workout-info"><h4>Fuerza Superior</h4><span>45 min · 4 series</span></div>
            <div class="workout-cal">-166 kcal</div>
        </div>
    </div>
    <div class="bottom-nav">
        <a href="#" class="active">🏠<span>Inicio</span></a>
        <a href="#">📊<span>Stats</span></a>
        <a href="#">🏋️<span>Entreno</span></a>
        <a href="#">👤<span>Perfil</span></a>
    </div>
</div>
</body>
</html>
